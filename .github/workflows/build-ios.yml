name: Build iOS App

# Si attiva a mano dalla scheda "Actions" di GitHub. Usa un runner macOS di
# GitHub (con Xcode già installato) — sostituisce completamente il bisogno di
# un Mac fisico. Serve però aver caricato il certificato di firma e il
# provisioning profile come Secret di repository prima di lanciarlo — vedi
# le istruzioni in IOS_RELEASE.md.
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Installa CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Importa certificato di firma e provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/oralzon-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/oralzon.mobileprovision

          # Il nome/UUID del profilo va letto dal file stesso — usarlo alla
          # cieca o affidarsi al matching automatico di Xcode è la causa più
          # comune di fallimenti con la firma manuale in CI.
          # Estrazione UUID più robusta: passa da un file intermedio reale
          # invece di /dev/stdin, che con PlistBuddy si è dimostrato fragile.
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/oralzon.mobileprovision
          security cms -D -i "$PROFILE_PATH" > $RUNNER_TEMP/profile.plist
          if [ ! -s "$RUNNER_TEMP/profile.plist" ]; then
            echo "::error::Impossibile decodificare il provisioning profile — il file potrebbe essere corrotto o vuoto."
            exit 1
          fi
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/profile.plist)
          if [ -z "$PROFILE_UUID" ]; then
            echo "::error::UUID del provisioning profile non trovato nel file decodificato."
            exit 1
          fi
          echo "Profilo trovato: $PROFILE_UUID"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Imposta numero di build univoco
        working-directory: ios/App
        run: |
          # Apple richiede che ogni caricamento abbia un numero di build (CFBundleVersion)
          # più alto di tutti i precedenti, anche a parità di versione (1.0). Usiamo il
          # numero di esecuzione del workflow GitHub, che aumenta sempre automaticamente
          # a ogni lancio — non richiede più nessun intervento manuale in futuro.
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${{ github.run_number }};/g" App.xcodeproj/project.pbxproj

      - name: Sostituisci i segnaposto di firma nel progetto Xcode
        working-directory: ios/App
        run: |
          sed -i '' "s/CI_TEAM_ID_PLACEHOLDER/${{ secrets.APPLE_TEAM_ID }}/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/CI_PROFILE_UUID_PLACEHOLDER/$PROVISIONING_PROFILE_UUID/g" App.xcodeproj/project.pbxproj

      - name: Compila e archivia l'app
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive archive

      - name: Genera ExportOptions.plist
        working-directory: ios/App
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.oralzon.myapp</key>
              <string>${{ env.PROVISIONING_PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Esporta il file .ipa
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist -exportPath $RUNNER_TEMP/export

      - name: Carica il file .ipa come risultato
        uses: actions/upload-artifact@v4
        with:
          name: oralzon-ios-release
          path: ${{ runner.temp }}/export/*.ipa

      # Caricamento automatico su App Store Connect — sostituisce il bisogno
      # di un Mac con l'app Transporter. Richiede una API Key di tipo "team"
      # creata su App Store Connect → Users and Access → Integrations → Keys
      # (le istruzioni esatte sono in IOS_RELEASE.md).
      - name: Carica su App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -n 1)
          xcrun altool --upload-app -f "$IPA_PATH" -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
