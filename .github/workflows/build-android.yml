name: Build Android App

# Si attiva a mano dalla scheda "Actions" di GitHub — non serve un Mac,
# Android si compila su un runner Linux normale.
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Installa dipendenze
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # La firma dell'app (keystore) va caricata come Secret di repository —
      # vedi le istruzioni in ANDROID_RELEASE.md prima di lanciare questo step
      - name: Decodifica keystore di firma
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/oralzon-release.keystore

      - name: Build Android App Bundle (.aab)
        working-directory: android
        env:
          ORALZON_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORALZON_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORALZON_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Carica il file .aab come risultato
        uses: actions/upload-artifact@v4
        with:
          name: oralzon-android-release
          path: android/app/build/outputs/bundle/release/app-release.aab
